<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Cambio ARS → UYU</title>
  <meta name="description" content="Convertidor de pesos argentinos a uruguayos" />
  <meta name="theme-color" content="#0a0c10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cambio" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0c10;
      --bg2: #0d0f14;
      --bg3: #13161d;
      --border: #1e2230;
      --border2: #2a2e38;
      --text: #e8e3d5;
      --muted: #4a5060;
      --muted2: #3a4050;
      --gold: #c8a84b;
      --green: #a3d45a;
      --green-dim: #4a6030;
      --green-bg: #0e1108;
      --green-border: #2a3818;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 40px;
      overscroll-behavior: none;
    }

    .wrapper {
      width: 100%;
      max-width: 480px;
      padding: 40px 20px 0;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .header-left .label {
      font-size: 10px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .header-left .title {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .header-right .rate-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      text-align: right;
      margin-bottom: 5px;
    }
    .rate-btn {
      background: none;
      border: 1px solid var(--border2);
      color: var(--muted);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 7px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 7px;
      transition: border-color 0.15s, color 0.15s;
    }
    .rate-btn:hover { border-color: var(--gold); color: var(--gold); }
    .rate-btn span.val { color: var(--gold); font-weight: 500; }
    .rate-input-wrap { display: flex; align-items: center; gap: 6px; }
    .rate-input {
      background: var(--bg3);
      border: 1px solid var(--gold);
      outline: none;
      color: var(--gold);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      padding: 5px 10px;
      border-radius: 7px;
      width: 110px;
      text-align: center;
    }
    .rate-ok {
      background: var(--gold);
      border: none;
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 7px;
      cursor: pointer;
    }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border2) 30%, var(--border2) 70%, transparent);
      margin: 18px 0;
    }

    /* ── CARDS ── */
    .card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 18px 22px;
      margin-bottom: 10px;
      background: var(--bg2);
      transition: border-color 0.3s, background 0.3s;
    }
    .card.result-active {
      background: var(--green-bg);
      border-color: var(--green-border);
    }
    .card-label {
      font-size: 10px;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 4px;
      transition: color 0.3s;
    }
    .card.result-active .card-label { color: var(--green-dim); }
    .amount-row {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .currency-sym {
      font-size: 22px;
      color: var(--muted2);
      font-weight: 300;
      transition: color 0.3s;
      flex-shrink: 0;
    }
    .card.result-active .currency-sym { color: #5a7040; }
    .main-input {
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: clamp(34px, 9vw, 60px);
      font-weight: 300;
      width: 100%;
      caret-color: var(--gold);
      letter-spacing: -1px;
    }
    .main-input::placeholder { color: var(--border2); }
    .result-num {
      font-size: clamp(34px, 9vw, 60px);
      font-weight: 300;
      letter-spacing: -1px;
      color: var(--border2);
      transition: color 0.3s;
    }
    .result-num.has-value { color: var(--green); }
    .formula {
      font-size: 10px;
      color: var(--muted2);
      margin-top: 6px;
      height: 14px;
      transition: color 0.3s;
    }
    .card.result-active .formula { color: #4a5030; }

    /* ── QUICK ACCESS ── */
    .section-label {
      font-size: 10px;
      color: var(--muted2);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .quick-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .quick-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: #9098a8;
      cursor: pointer;
      padding: 13px 6px;
      border-radius: 11px;
      font-family: 'DM Mono', monospace;
      text-align: center;
      transition: background 0.18s, border-color 0.18s, color 0.18s, transform 0.12s;
      line-height: 1.3;
    }
    .quick-btn:hover {
      background: #1a1e28;
      border-color: #3a4060;
      color: var(--text);
      transform: translateY(-1px);
    }
    .quick-btn:active { transform: scale(0.95); }
    .quick-btn.flash {
      background: #1e2510;
      border-color: #7fb83a;
      color: var(--green);
    }
    .q-ars { font-size: 14px; font-weight: 500; color: var(--gold); }
    .q-uyu { font-size: 11px; color: var(--muted); margin-top: 3px; }

    /* ── FOOTER ── */
    .footer {
      margin-top: 28px;
      text-align: center;
      font-size: 10px;
      color: var(--border2);
      letter-spacing: 0.08em;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--gold);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      padding: 10px 20px;
      border-radius: 30px;
      opacity: 0;
      transition: all 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .wrapper { animation: fadeIn 0.4s ease; }
  </style>
</head>
<body>
<div class="wrapper">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="label">Convertidor de viaje</div>
      <div class="title">ARS → UYU</div>
    </div>
    <div class="header-right">
      <div class="rate-label">Mi cambio hoy</div>
      <div id="rate-display">
        <button class="rate-btn" onclick="startEditRate()">
          <span class="val" id="rate-val">0.0292</span>
          <span>✏️</span>
        </button>
      </div>
      <div id="rate-edit" class="rate-input-wrap" style="display:none">
        <input class="rate-input" id="rate-input" type="number" step="0.0001" inputmode="decimal" />
        <button class="rate-ok" onclick="commitRate()">OK</button>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- ARS INPUT -->
  <div class="card" id="card-ars">
    <div class="card-label">Pesos Argentinos</div>
    <div class="amount-row">
      <span class="currency-sym">$</span>
      <input class="main-input" id="ars-input" type="text" inputmode="numeric" placeholder="0" oninput="onArsInput(this)" />
    </div>
  </div>

  <!-- UYU RESULT -->
  <div class="card" id="card-uyu">
    <div class="card-label">Pesos Uruguayos</div>
    <div class="amount-row">
      <span class="currency-sym">$U</span>
      <div class="result-num" id="result-num">0.00</div>
    </div>
    <div class="formula" id="formula"></div>
  </div>

  <!-- QUICK ACCESS -->
  <div class="section-label" style="margin-top:16px">Acceso rápido</div>
  <div class="quick-grid" id="quick-grid"></div>

  <div class="footer">1 ARS = <span id="footer-rate">0.0292</span> UYU · Tocá ✏️ para actualizar el cambio</div>
</div>

<div class="toast" id="toast"></div>

<script>
  const QUICK = [500, 1000, 2000, 5000, 10000, 20000, 50000, 100000];
  let rate = parseFloat(localStorage.getItem('cambio_rate') || '0.0292');

  const fmtARS = n => n.toLocaleString('es-AR', { maximumFractionDigits: 0 });
  const fmtUYU = n => n.toLocaleString('es-UY', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  function renderRate() {
    document.getElementById('rate-val').textContent = rate;
    document.getElementById('footer-rate').textContent = rate;
    renderQuick();
    recalc();
  }

  function startEditRate() {
    document.getElementById('rate-display').style.display = 'none';
    document.getElementById('rate-edit').style.display = 'flex';
    const inp = document.getElementById('rate-input');
    inp.value = rate;
    inp.focus();
    inp.select();
  }

  function commitRate() {
    const val = parseFloat(document.getElementById('rate-input').value.replace(',', '.'));
    if (!isNaN(val) && val > 0) {
      rate = val;
      localStorage.setItem('cambio_rate', rate);
      showToast('✅ Cambio actualizado: ' + rate);
    }
    document.getElementById('rate-edit').style.display = 'none';
    document.getElementById('rate-display').style.display = 'block';
    renderRate();
  }

  document.getElementById('rate-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') commitRate();
    if (e.key === 'Escape') {
      document.getElementById('rate-edit').style.display = 'none';
      document.getElementById('rate-display').style.display = 'block';
    }
  });

  function getArsValue() {
    const raw = document.getElementById('ars-input').value.replace(/\./g, '').replace(',', '.');
    return parseFloat(raw) || 0;
  }

  function onArsInput(el) {
    const raw = el.value.replace(/[^\d]/g, '');
    if (raw === '') { el.value = ''; recalc(); return; }
    const n = parseInt(raw, 10);
    el.value = fmtARS(n);
    recalc();
  }

  function recalc() {
    const ars = getArsValue();
    const uyu = ars * rate;
    const numEl = document.getElementById('result-num');
    const cardUyu = document.getElementById('card-uyu');
    const formula = document.getElementById('formula');

    numEl.textContent = fmtUYU(uyu);
    if (ars > 0) {
      numEl.classList.add('has-value');
      cardUyu.classList.add('result-active');
      formula.textContent = fmtARS(ars) + ' × ' + rate + ' = ' + fmtUYU(uyu) + ' UYU';
    } else {
      numEl.classList.remove('has-value');
      cardUyu.classList.remove('result-active');
      numEl.textContent = '0.00';
      formula.textContent = '';
    }
  }

  function renderQuick() {
    const grid = document.getElementById('quick-grid');
    grid.innerHTML = '';
    QUICK.forEach(amt => {
      const btn = document.createElement('button');
      btn.className = 'quick-btn';
      const label = amt >= 1000 ? (amt / 1000) + 'k' : amt;
      btn.innerHTML = `<div class="q-ars">${label}</div><div class="q-uyu">$U ${fmtUYU(amt * rate)}</div>`;
      btn.onclick = () => {
        document.getElementById('ars-input').value = fmtARS(amt);
        recalc();
        btn.classList.add('flash');
        setTimeout(() => btn.classList.remove('flash'), 380);
      };
      grid.appendChild(btn);
    });
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }

  // Init
  renderRate();
</script>
</body>
</html>
